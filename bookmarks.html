<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thoughtflow — Bookmarks</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#1a1209;--cream:#faf6ef;--warm:#f0e8d8;--gold:#c9933a;--gold-light:#e8b96a;--rust:#b85c38;--muted:#8a7968;--border:#d4c9b8;--hw:64px}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
    header{position:fixed;top:0;left:0;right:0;height:var(--hw);background:rgba(250,246,239,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.4rem;gap:1rem;z-index:100}
    .brand{display:flex;align-items:center;gap:.6rem;text-decoration:none}
    .brand-icon{width:34px;height:34px;background:var(--ink);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--gold-light);font-size:1rem}
    .brand-name{font-family:'Playfair Display',serif;font-size:1.22rem;font-weight:700;color:var(--ink)}
    .back-btn{display:flex;align-items:center;gap:.4rem;padding:.42rem .9rem;border:1.5px solid var(--border);border-radius:50px;background:none;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;color:var(--ink);transition:all .2s;text-decoration:none;margin-left:auto}
    .back-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
    main{padding-top:calc(var(--hw) + 2rem);max-width:720px;margin:0 auto;padding-left:1.5rem;padding-right:1.5rem;padding-bottom:2rem}
    .page-hdr{margin-bottom:1.8rem}
    .page-hdr h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;margin-bottom:.3rem}
    .page-hdr p{color:var(--muted);font-size:.9rem}
    .pc{background:#fff;border:1px solid var(--border);border-radius:14px;padding:1.3rem;margin-bottom:.85rem;transition:all .3s;animation:fadeUp .4s ease both;position:relative}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .pc:hover{border-color:var(--gold);box-shadow:0 6px 24px rgba(0,0,0,.08);transform:translateY(-2px)}
    .ph{display:flex;align-items:center;gap:.7rem;margin-bottom:.9rem}
    .pav{width:38px;height:38px;border-radius:50%;background:var(--warm);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--rust);font-size:.9rem;flex-shrink:0;cursor:pointer}
    .pm{flex:1}
    .paname{font-weight:700;font-size:.88rem;cursor:pointer;color:var(--ink)}
    .paname:hover{color:var(--rust);text-decoration:underline}
    .ptime{font-size:.75rem;color:var(--muted)}
    .pbody h3{font-family:'Playfair Display',serif;font-size:1.08rem;line-height:1.38;margin-bottom:.4rem}
    .pbody p{font-size:.88rem;line-height:1.65;color:#3d3427}
    .ptags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.65rem}
    .tag{padding:.2rem .6rem;background:var(--warm);border-radius:50px;font-size:.74rem;color:var(--rust);font-weight:500;border:none;cursor:pointer;transition:all .14s}
    .tag:hover{background:var(--rust);color:#fff}
    .pcat{display:inline-flex;align-items:center;gap:.3rem;padding:.16rem .55rem;background:#fff3e8;border:1px solid #f0d5b0;border-radius:50px;font-size:.7rem;color:var(--gold);font-weight:500;margin-top:.5rem}
    .pf{display:flex;align-items:center;gap:.4rem;margin-top:.8rem;padding-top:.75rem;border-top:1px solid var(--border)}
    .ab{display:flex;align-items:center;gap:.3rem;padding:.35rem .65rem;border:1.5px solid transparent;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;background:none;color:var(--muted);transition:all .18s}
    .ab:hover{background:var(--warm);color:var(--rust);border-color:var(--border)}
    .ab.saved{color:var(--gold);border-color:#f0d9a8;background:#fdf5e4}
    .rm-bm{margin-left:auto;padding:.35rem .7rem;border:1.5px solid #fca5a5;border-radius:50px;background:none;font-size:.76rem;cursor:pointer;color:#e74c3c;font-family:'DM Sans',sans-serif;transition:all .2s}
    .rm-bm:hover{background:#e74c3c;color:#fff}
    .empty{text-align:center;padding:4rem 1rem}
    .empty .em{font-size:2.8rem;margin-bottom:1rem}
    .empty h3{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:.5rem}
    .empty p{color:var(--muted);font-size:.9rem;margin-bottom:1.3rem}
    .empty a{display:inline-block;padding:.56rem 1.3rem;background:var(--ink);color:#fff;border-radius:50px;text-decoration:none;font-size:.88rem;font-weight:500}
    .empty a:hover{background:var(--gold)}
    .toast{position:fixed;bottom:1.4rem;right:1.4rem;background:var(--ink);color:#fff;padding:.7rem 1rem;border-radius:10px;font-size:.85rem;z-index:999;transform:translateY(80px);opacity:0;transition:all .28s;box-shadow:0 4px 18px rgba(0,0,0,.14)}
    .toast.show{transform:translateY(0);opacity:1}
    .spin{display:inline-block;width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .ld{text-align:center;padding:2rem;color:var(--muted)}
    .bm-count{font-size:.82rem;color:var(--muted);margin-bottom:1rem}
    .post-img{width:100%;border-radius:10px;margin-top:.7rem;height:auto;display:block;cursor:zoom-in;transition:opacity .15s}
    .post-img:hover{opacity:.92}
    .img-lb{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:900;display:flex;align-items:center;justify-content:center;padding:1.2rem;opacity:0;pointer-events:none;transition:opacity .22s;cursor:zoom-out}
    .img-lb.open{opacity:1;pointer-events:all}
    .img-lb img{max-width:100%;max-height:92vh;border-radius:10px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.5)}
    .img-lb-close{position:absolute;top:1rem;right:1.2rem;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.4rem;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .img-lb-close:hover{background:rgba(255,255,255,.3)}
  </style>
</head>
<body>
<header>
  <a href="main.html" class="brand"><div class="brand-icon">✦</div><span class="brand-name">Thoughtflow</span></a>
  <a href="main.html" class="back-btn">← Back to Feed</a>
</header>
<main>
  <div class="page-hdr">
    <h1>🔖 Bookmarks</h1>
    <p>Posts you've saved for later</p>
  </div>
  <div class="bm-count" id="bmCount"></div>
  <div id="feed"><div class="ld"><div class="spin"></div></div></div>
</main>
<div class="toast" id="toast"></div>
<!-- IMAGE LIGHTBOX -->
<div class="img-lb" id="imgLb" onclick="if(event.target===this||event.target.closest('.img-lb-close'))closeLb()">
  <button class="img-lb-close" onclick="closeLb()">✕</button>
  <img id="imgLbImg" src="" alt="Full image">
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const cfg={apiKey:"AIzaSyCcgJ95GBqTe0mDRu09b5vvigmBlq7l8us",authDomain:"loginauthproject-34e2a.firebaseapp.com",projectId:"loginauthproject-34e2a",storageBucket:"loginauthproject-34e2a.firebasestorage.app",messagingSenderId:"538191570556",appId:"1:538191570556:web:5a3e3f2f4cfb3776accbf9"};
  const app=initializeApp(cfg), auth=getAuth(app), db=getFirestore(app);
  let bookmarks=[];
  let liked=[];
  let currentUser=null;

  onAuthStateChanged(auth, async u=>{
    if(!u){window.location.href='index.html';return;}
    currentUser=u;
    // Load per-user bookmarks and liked from Firestore
    try{
      const ud=await getDoc(doc(db,'users',u.uid));
      if(ud.exists()){
        bookmarks=ud.data().bookmarkedPosts||[];
        liked=ud.data().likedPosts||[];
      }
    }catch(e){}
    loadBookmarks();
  });

  async function loadBookmarks(){
    const feed=document.getElementById('feed');
    const bmCount=document.getElementById('bmCount');
    if(!bookmarks.length){
      bmCount.textContent='';
      feed.innerHTML=`<div class="empty"><div class="em">🔖</div><h3>No bookmarks yet</h3><p>Save posts you love by clicking the 📌 button.</p><a href="main.html">Browse Feed</a></div>`;
      return;
    }
    bmCount.textContent=bookmarks.length+' saved post'+(bookmarks.length>1?'s':'');
    const posts=[];
    for(const id of bookmarks){
      try{const d=await getDoc(doc(db,'posts',id));if(d.exists())posts.push({id:d.id,...d.data()});}catch(e){}
    }
    if(!posts.length){
      feed.innerHTML=`<div class="empty"><div class="em">🔖</div><h3>Nothing found</h3><p>Your bookmarked posts may have been deleted.</p><a href="main.html">Browse Feed</a></div>`;
      return;
    }
    feed.innerHTML=posts.map((p,i)=>{
      const init=p.authorName?p.authorName[0].toUpperCase():'?';
      const t=p.createdAt?timeAgo(p.createdAt.toDate?p.createdAt.toDate():new Date(p.createdAt)):'';
      const lk=liked.includes(p.id);
      const tags=(p.tags||[]).map(tg=>`<button class="tag">#${tg}</button>`).join('');
      const cat=p.category?`<span class="pcat">📁 ${p.category}</span>`:'';
      return `<div class="pc" id="bm-${p.id}" style="animation-delay:${i*.04}s">
        <div class="ph">
          <div class="pav" onclick="window.location.href='profile.html?uid=${p.authorId}'">${init}</div>
          <div class="pm">
            <div class="paname" onclick="window.location.href='profile.html?uid=${p.authorId}'">${p.authorName||'Anonymous'}</div>
            <div class="ptime">${t}</div>
          </div>
        </div>
        <div class="pbody">
          ${p.title?`<h3>${p.title}</h3>`:''}
          <p>${p.content||''}</p>
          ${p.imageBase64?`<img class="post-img" src="${p.imageBase64}" alt="Post image" loading="lazy" onclick="openLb(this.src)">`:''}
          <div class="ptags">${tags}</div>
          ${cat}
        </div>
        <div class="pf">
          <button class="ab${lk?' liked':''}">${lk?'❤️':'🤍'} ${p.likes||0}</button>
          <button class="ab">💬 ${p.comments||0}</button>
          <button class="rm-bm" onclick="removeBM('${p.id}')">Remove bookmark</button>
        </div>
      </div>`;
    }).join('');
  }

  window.removeBM=async function(id){
    bookmarks=bookmarks.filter(b=>b!==id);
    document.getElementById('bm-'+id)?.remove();
    const cnt=document.getElementById('bmCount');
    cnt.textContent=bookmarks.length+' saved post'+(bookmarks.length>1?'s':'');
    if(!bookmarks.length) loadBookmarks();
    toast('Bookmark removed');
    // Remove from Firestore per-user bookmarks
    if(currentUser){
      try{ await updateDoc(doc(db,'users',currentUser.uid),{bookmarkedPosts:arrayRemove(id)}); }catch(e){}
    }
  };

  window.toast=function(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);};
  window.openLb=function(src){document.getElementById('imgLbImg').src=src;document.getElementById('imgLb').classList.add('open');document.body.style.overflow='hidden';};
  window.closeLb=function(){document.getElementById('imgLb').classList.remove('open');document.body.style.overflow='';};
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});
  function timeAgo(d){const s=Math.floor((new Date()-d)/1000);if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
</script>
</body>
</html>
